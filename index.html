<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中午吃什么</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }

        .header p {
            opacity: 0.9;
            margin-top: 8px;
            font-size: 14px;
        }

        /* Lucky Draw Card */
        .lucky-draw {
            background: white;
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            margin-bottom: 30px;
            text-align: center;
        }

        .lucky-draw-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            box-shadow: 0 10px 30px rgba(245, 87, 108, 0.4);
        }

        .lucky-draw-title {
            font-size: 18px;
            color: #333;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .draw-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 16px 48px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
            font-weight: 600;
        }

        .draw-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.5);
        }

        .draw-btn:active {
            transform: translateY(0);
        }

        .draw-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        /* Result Card */
        .result-card {
            display: none;
            margin-top: 30px;
            padding: 24px;
            background: linear-gradient(135deg, #fff7ed 0%, #ffedd5 100%);
            border-radius: 16px;
            border: 2px solid #fed7aa;
            animation: slideUp 0.5s ease;
        }

        .result-card.show {
            display: block;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-restaurant {
            font-size: 24px;
            font-weight: 700;
            color: #ea580c;
            margin-bottom: 8px;
        }

        .result-dish {
            font-size: 16px;
            color: #c2410c;
            margin-bottom: 16px;
            padding: 8px 16px;
            background: white;
            border-radius: 20px;
            display: inline-block;
        }

        .result-action {
            display: inline-block;
            background: #ea580c;
            color: white;
            padding: 12px 32px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .result-action:hover {
            background: #c2410c;
            transform: scale(1.05);
        }

        /* Restaurant List */
        .section-title {
            color: white;
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .restaurant-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .restaurant-card {
            background: white;
            border-radius: 16px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .restaurant-card:hover {
            transform: translateX(8px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }

        .restaurant-icon {
            width: 56px;
            height: 56px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
        }

        .restaurant-info {
            flex: 1;
            min-width: 0;
        }

        .restaurant-name {
            font-size: 17px;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 4px;
        }

        .restaurant-tags {
            font-size: 13px;
            color: #6b7280;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            flex-shrink: 0;
        }

        .status-open {
            background: #d1fae5;
            color: #059669;
        }

        .status-closed {
            background: #fee2e2;
            color: #dc2626;
        }

        .status-pending {
            background: #fef3c7;
            color: #d97706;
        }

        .arrow-icon {
            color: #9ca3af;
            font-size: 20px;
        }

        /* Footer */
        .footer {
            text-align: center;
            color: rgba(255,255,255,0.7);
            margin-top: 40px;
            font-size: 13px;
        }

        /* Animations */
        @keyframes shake {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-5deg); }
            75% { transform: rotate(5deg); }
        }

        .shaking {
            animation: shake 0.1s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .pulse {
            animation: pulse 0.5s ease-in-out;
        }

        /* Loading state */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin-left: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>🍽️ 中午吃什么</h1>
            <p>每天纠结吃什么？交给命运吧！</p>
        </header>

        <section class="lucky-draw">
            <div class="lucky-draw-icon">🎲</div>
            <div class="lucky-draw-title">今天吃什么由天决定</div>
            <button class="draw-btn" id="drawBtn" onclick="drawLucky()">
                开始抽签
            </button>
            <div class="result-card" id="resultCard">
                <div class="result-restaurant" id="resultRestaurant"></div>
                <div class="result-dish" id="resultDish"></div>
                <div>
                    <a class="result-action" id="resultAction" href="#" target="_blank">
                        立即下单 →
                    </a>
                </div>
            </div>
        </section>

        <h2 class="section-title">
            <span>🏪</span> 餐厅合集
        </h2>

        <div class="restaurant-list" id="restaurantList"></div>

        <footer class="footer">
            <p>点击餐厅即可跳转下单</p>
        </footer>
    </div>

    <script>
        const restaurants = [
            {
                name: "原切牛排",
                tags: "牛排/汉堡/意面",
                icon: "🥩",
                iconBg: "linear-gradient(135deg, #f87171 0%, #ef4444 100%)",
                dish: "招牌牛排套餐",
                coupon: "22元券",
                url: "https://wx-kaci.shouqianba.com/qrcode/1962037596436176896?dId=1962040162454704136"
            },
            {
                name: "山城渝面",
                tags: "面/米线/酸辣粉",
                icon: "🍜",
                iconBg: "linear-gradient(135deg, #f97316 0%, #ea580c 100%)",
                dish: "重庆小面",
                url: "https://wx-kaci.shouqianba.com/qrcode/1962037596436176896?dId=1962040162454704134"
            },
            {
                name: "杭儿拌川",
                tags: "拌川/片儿川/汤面",
                icon: "🍜",
                iconBg: "linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%)",
                dish: "招牌拌川",
                url: "https://wx-kaci.shouqianba.com/qrcode/1962037596436176896?dId=1962040162454704139"
            },
            {
                name: "滋滋拌饭",
                tags: "石锅拌饭/烤肉/炸鸡",
                icon: "🍛",
                iconBg: "linear-gradient(135deg, #fb923c 0%, #f97316 100%)",
                dish: "石锅拌饭",
                url: "https://wx-kaci.shouqianba.com/qrcode/1962037596436176896?dId=1962040162454704137"
            },
            {
                name: "瓯满鲜海鲜面",
                tags: "海鲜面/炒饭/小海鲜",
                icon: "🦐",
                iconBg: "linear-gradient(135deg, #38bdf8 0%, #0ea5e9 100%)",
                dish: "海鲜面大份",
                url: "https://wx-kaci.shouqianba.com/qrcode/1962037596436176896?dId=1962040162454704143"
            },
            {
                name: "百味食肆",
                tags: "生煎包/豆花/馄饨/卤味",
                icon: "🥟",
                iconBg: "linear-gradient(135deg, #a3e635 0%, #84cc16 100%)",
                dish: "生煎包+豆花",
                url: "https://wx-kaci.shouqianba.com/qrcode/1962037596436176896?dId=1962040162454704138"
            },
            {
                name: "辣么冒菜",
                tags: "冒菜/麻辣烫",
                icon: "🌶️",
                iconBg: "linear-gradient(135deg, #dc2626 0%, #b91c1c 100%)",
                dish: "冒菜套餐",
                url: "https://wx-kaci.shouqianba.com/qrcode/1962037596436176896?dId=1962040162454704146"
            },
            {
                name: "酸菜鱼饭",
                tags: "酸菜鱼/水煮鱼/烤鱼",
                icon: "🐟",
                iconBg: "linear-gradient(135deg, #22d3ee 0%, #06b6d4 100%)",
                dish: "酸菜鱼套餐",
                url: "https://rms.meituan.com/diancan/14/2Q4xMemLoLY"
            },
            {
                name: "鲜烫牛肉米线",
                tags: "牛肉米线/羊肉米线/小笼包",
                icon: "🍲",
                iconBg: "linear-gradient(135deg, #f43f5e 0%, #e11d48 100%)",
                dish: "牛肉米线",
                url: "https://wx-kaci.shouqianba.com/qrcode/1962037596436176896?dId=1962040162454704140"
            }
        ];

        // Get current hour to determine business status
        function getBusinessStatus() {
            const hour = new Date().getHours();
            // Assume restaurants open 10:00-21:00
            if (hour >= 10 && hour < 21) {
                return { status: 'open', text: '营业中' };
            } else {
                return { status: 'closed', text: '已打烊' };
            }
        }

        // Render restaurant list
        function renderRestaurants() {
            const list = document.getElementById('restaurantList');
            const businessStatus = getBusinessStatus();

            list.innerHTML = restaurants.map((r, index) => `
                <div class="restaurant-card" onclick="goToStore(${index})">
                    <div class="restaurant-icon" style="background: ${r.iconBg}">${r.icon}</div>
                    <div class="restaurant-info">
                        <div class="restaurant-name">${r.name}</div>
                        <div class="restaurant-tags">${r.tags}</div>
                    </div>
                    <span class="status-badge status-${businessStatus.status}">${businessStatus.text}</span>
                    <span class="arrow-icon">›</span>
                </div>
            `).join('');
        }

        // Lucky draw function
        function drawLucky() {
            const btn = document.getElementById('drawBtn');
            const resultCard = document.getElementById('resultCard');

            // Add shaking animation
            btn.classList.add('shaking');
            btn.disabled = true;
            btn.innerHTML = '抽奖中<span class="loading"></span>';

            // Simulate random draw time
            setTimeout(() => {
                btn.classList.remove('shaking');

                // Random selection
                const randomIndex = Math.floor(Math.random() * restaurants.length);
                const restaurant = restaurants[randomIndex];

                // Display result
                document.getElementById('resultRestaurant').textContent = restaurant.name;
                document.getElementById('resultDish').textContent = `推荐: ${restaurant.dish}`;
                document.getElementById('resultAction').href = restaurant.url;

                // Show result card with animation
                resultCard.classList.remove('show');
                void resultCard.offsetWidth; // Trigger reflow
                resultCard.classList.add('show');

                // Update button
                btn.innerHTML = '🎲 再抽一次';
                btn.disabled = false;
                btn.classList.add('pulse');
                setTimeout(() => btn.classList.remove('pulse'), 500);

            }, 1500);
        }

        // Go to store
        function goToStore(index) {
            const restaurant = restaurants[index];
            window.open(restaurant.url, '_blank');
        }

        // Initialize
        renderRestaurants();
    </script>
</body>
</html>
