<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中午吃什么</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }

        .header p {
            opacity: 0.9;
            margin-top: 8px;
            font-size: 14px;
        }

        /* Market Card */
        .market-card {
            background: white;
            border-radius: 20px;
            padding: 20px 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            margin-bottom: 24px;
        }

        .market-title {
            font-size: 15px;
            color: #6b7280;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .market-indices {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }

        .market-index {
            padding: 12px;
            border-radius: 12px;
            background: #f9fafb;
        }

        .market-index-name {
            font-size: 12px;
            color: #6b7280;
            margin-bottom: 4px;
        }

        .market-index-price {
            font-size: 18px;
            font-weight: 700;
            color: #1f2937;
        }

        .market-index-change {
            font-size: 13px;
            margin-top: 2px;
        }

        .market-change-up { color: #ef4444; }
        .market-change-down { color: #22c55e; }

        .market-tip {
            padding: 14px 20px;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            text-align: center;
        }

        .market-tip.up {
            background: linear-gradient(135deg, #fef2f2 0%, #fee2e2 100%);
            color: #dc2626;
        }

        .market-tip.down {
            background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
            color: #16a34a;
        }

        .market-tip.flat {
            background: linear-gradient(135deg, #fefce8 0%, #fef3c7 100%);
            color: #d97706;
        }

        .market-loading {
            text-align: center;
            padding: 30px;
            color: #6b7280;
            font-size: 14px;
        }

        /* Lucky Draw Card */
        .lucky-draw {
            background: white;
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            margin-bottom: 30px;
            text-align: center;
        }

        .lucky-draw-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            box-shadow: 0 10px 30px rgba(245, 87, 108, 0.4);
        }

        .lucky-draw-title {
            font-size: 18px;
            color: #333;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .draw-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 16px 48px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
            font-weight: 600;
        }

        .draw-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.5);
        }

        .draw-btn:active {
            transform: translateY(0);
        }

        .draw-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        /* Result Card */
        .result-card {
            display: none;
            margin-top: 30px;
            padding: 24px;
            background: linear-gradient(135deg, #fff7ed 0%, #ffedd5 100%);
            border-radius: 16px;
            border: 2px solid #fed7aa;
            animation: slideUp 0.5s ease;
        }

        .result-card.show {
            display: block;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-restaurant {
            font-size: 24px;
            font-weight: 700;
            color: #ea580c;
            margin-bottom: 8px;
        }

        .result-dish {
            font-size: 16px;
            color: #c2410c;
            margin-bottom: 16px;
            padding: 8px 16px;
            background: white;
            border-radius: 20px;
            display: inline-block;
        }

        .result-action {
            display: inline-block;
            background: #ea580c;
            color: white;
            padding: 12px 32px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .result-action:hover {
            background: #c2410c;
            transform: scale(1.05);
        }

        /* Restaurant List */
        .section-title {
            color: white;
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .restaurant-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* 二楼两列展示 */
        #secondRestaurantList {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        #secondRestaurantList .restaurant-card {
            flex-direction: column;
            align-items: flex-start;
        }

        .restaurant-card {
            background: white;
            border-radius: 16px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .restaurant-card:hover {
            transform: translateX(8px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }

        .restaurant-votes {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .vote-btn {
            border: 1px solid rgba(0,0,0,0.06);
            background: #f3f4f6;
            border-radius: 14px;
            padding: 6px 10px;
            cursor: pointer;
            font-size: 13px;
            color: #111827;
            transition: all 0.2s ease;
            user-select: none;
        }

        .vote-btn.selected-like {
            background: #dcfce7;
            border-color: #86efac;
            color: #16a34a;
        }

        .vote-btn.selected-dislike {
            background: #fee2e2;
            border-color: #fca5a5;
            color: #dc2626;
        }

        .restaurant-icon {
            width: 56px;
            height: 56px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
        }

        .restaurant-info {
            flex: 1;
            min-width: 0;
        }

        .restaurant-name {
            font-size: 17px;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 4px;
        }

        .restaurant-tags {
            font-size: 13px;
            color: #6b7280;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            flex-shrink: 0;
        }

        .status-open {
            background: #d1fae5;
            color: #059669;
        }

        .status-closed {
            background: #fee2e2;
            color: #dc2626;
        }

        .status-pending {
            background: #fef3c7;
            color: #d97706;
        }

        .arrow-icon {
            color: #9ca3af;
            font-size: 20px;
        }

        /* QR Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 340px;
            width: 100%;
            text-align: center;
            animation: modalIn 0.3s ease;
        }

        @keyframes modalIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .modal-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #1f2937;
        }

        .modal-tags {
            font-size: 14px;
            color: #6b7280;
            margin-bottom: 20px;
        }

        .modal-qr {
            background: #f9fafb;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 16px;
        }

        .modal-qr img {
            width: 100%;
            max-width: 240px;
            height: auto;
            display: block;
            margin: 0 auto;
        }

        .modal-hint {
            font-size: 13px;
            color: #9ca3af;
            margin-bottom: 20px;
        }

        .modal-close {
            background: #f3f4f6;
            color: #374151;
            border: none;
            padding: 12px 32px;
            font-size: 15px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
        }

        .modal-close:hover {
            background: #e5e7eb;
        }

        /* Footer */
        .footer {
            text-align: center;
            color: rgba(255,255,255,0.7);
            margin-top: 40px;
            font-size: 13px;
        }

        /* Animations */
        @keyframes shake {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-5deg); }
            75% { transform: rotate(5deg); }
        }

        .shaking {
            animation: shake 0.1s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .pulse {
            animation: pulse 0.5s ease-in-out;
        }

        /* Loading state */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin-left: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>🍽️ 中午吃什么</h1>
            <p>每天纠结吃什么？交给命运吧！</p>
        </header>

        <section class="market-card">
            <div class="market-title">📈 今日行情</div>
            <div class="market-indices" id="marketIndices">
                <div class="market-loading">加载中...</div>
            </div>
            <div class="market-tip" id="marketTip">加载中...</div>

        <section class="lucky-draw">

            <div class="lucky-draw-title">今天喝什么由天决定</div>
            <button class="draw-btn" id="drinkDrawBtn" onclick="drawDrink()">开始抽签</button>
            <div class="result-card" id="drinkResultCard">
                <div class="result-restaurant" id="drinkResultRestaurant"></div>
                <div class="result-dish" id="drinkResultDish"></div>
                <div>
                    <a class="result-action" id="drinkResultAction" href="javascript:void(0)">立即下单 →</a>
                </div>
            </div>
        </section>

        <h2 class="section-title" style="margin-top:26px;"><span>🏪</span> 一楼餐厅合集</h2>
        <div class="restaurant-list" id="firstRestaurantList"></div>

        <h2 class="section-title" style="margin-top:26px;"><span>🏮</span> 二楼档口集合展示</h2>
        <div class="restaurant-list" id="secondRestaurantList"></div>

        <h2 class="section-title" style="margin-top:26px;"><span>🧾</span> 点单区域</h2>
        <div class="restaurant-list" id="drinkOrderList"></div>

        <footer class="footer">
            <p>点击餐厅扫码下单</p>
        </footer>
    </div>

    <!-- QR Code Modal -->
    <div class="modal-overlay" id="qrModal">
        <div class="modal-content">
            <div class="modal-title" id="modalTitle"></div>
            <div class="modal-tags" id="modalTags"></div>
            <div class="modal-qr">
                <img id="modalQr" src="" alt="扫码下单">
            </div>
            <div class="modal-hint" id="modalHint">请使用微信/支付宝扫码下单</div>
            <button class="modal-close" onclick="closeModal()">关闭</button>
        </div>
    </div>

    <script>
        const firstFloorRestaurants = [
            { id: "raw_slice_steak", name: "原切牛排", tags: "牛排/汉堡/意面", icon: "🥩", iconBg: "linear-gradient(135deg, #f87171 0%, #ef4444 100%)", dish: "招牌牛排套餐", qrImage: "../原切牛排.jpg" },
            { id: "shan_cheng_yu_mian", name: "山城渝面", tags: "面/米线/酸辣粉", icon: "🍜", iconBg: "linear-gradient(135deg, #f97316 0%, #ea580c 100%)", dish: "重庆小面", qrImage: "../山城渝面.jpg" },
            { id: "hang_er_ban_chuan", name: "杭儿拌川", tags: "拌川/片儿川/汤面", icon: "🍜", iconBg: "linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%)", dish: "招牌拌川", url: "https://wx-kaci.shouqianba.com/qrcode/1962037596436176896?dId=1962040162454704139" },
            { id: "xinjiang_grab_fan_wang", name: "新疆抓饭王", tags: "抓饭/烤肉", icon: "🍛", iconBg: "linear-gradient(135deg, #fb923c 0%, #f97316 100%)", dish: "新疆抓饭", qrImage: "新增/一楼/IMG_20260325_124121.jpg", url: "https://wx-kaci.shouqianba.com/qrcode/1962037596436176896?dId=2035182666172751873" },
            { id: "ou_man_xian_hai_xian_mian", name: "瓯满鲜海鲜面", tags: "海鲜面/炒饭/小海鲜", icon: "🦐", iconBg: "linear-gradient(135deg, #38bdf8 0%, #0ea5e9 100%)", dish: "海鲜面大份", url: "https://wx-kaci.shouqianba.com/qrcode/1962037596436176896?dId=1962040162454704143" },
            { id: "bai_wei_shi_si", name: "百味食肆", tags: "生煎包/豆花/馄饨/卤味", icon: "🥟", iconBg: "linear-gradient(135deg, #a3e635 0%, #84cc16 100%)", dish: "生煎包+豆花", url: "https://wx-kaci.shouqianba.com/qrcode/1962037596436176896?dId=1962040162454704138" },
            { id: "la_me_mao_cai", name: "辣么冒菜", tags: "冒菜/麻辣烫", icon: "🌶️", iconBg: "linear-gradient(135deg, #dc2626 0%, #b91c1c 100%)", dish: "冒菜套餐", url: "https://wx-kaci.shouqianba.com/qrcode/1962037596436176896?dId=1962040162454704146" },
            { id: "suan_cai_yu_fan", name: "酸菜鱼饭", tags: "酸菜鱼/水煮鱼/烤鱼", icon: "🐟", iconBg: "linear-gradient(135deg, #22d3ee 0%, #06b6d4 100%)", dish: "酸菜鱼套餐", qrImage: "../酸菜鱼饭.jpg" },
            { id: "xian_tang_niu_rou_mi_xian", name: "鲜烫牛肉米线", tags: "牛肉米线/羊肉米线/小笼包", icon: "🍲", iconBg: "linear-gradient(135deg, #f43f5e 0%, #e11d48 100%)", dish: "牛肉米线", url: "https://rms.meituan.com/diancan/14/2Q4xMemLoLY" },
            { id: "nuan_ning_wang_xuan_you_xuan", name: "暖柠（王煊优选）", tags: "轻食", icon: "🥗", iconBg: "linear-gradient(135deg, #fde68a 0%, #f59e0b 100%)", dish: "暖柠（王煊优选）", qrImage: "新增/暖柠_码.jpg" }
        ];
        const secondFloorRestaurants = [
            { id: "er_1", name: "蒸蒸日上", dish: "蒸饺/包子", imageSrc: "新增/二楼/IMG_20260325_123358.jpg" },
            { id: "er_2", name: "朱家小饺羊杂面", dish: "羊杂面/小饺", imageSrc: "新增/二楼/IMG_20260325_123404.jpg" },
            { id: "er_3", name: "浙味自选餐", dish: "自选饭菜/热菜", imageSrc: "新增/二楼/IMG_20260325_123427.jpg" },
            { id: "er_4", name: "重庆小面", dish: "小面/杂酱面", imageSrc: "新增/二楼/IMG_20260325_123502.jpg" },
            { id: "er_5", name: "港岛滑蛋饭", dish: "滑蛋饭/鸡汤", imageSrc: "新增/二楼/IMG_20260325_123519.jpg" },
            { id: "er_6", name: "九龙烧烤焗饭", dish: "烧烤焗饭", imageSrc: "新增/二楼/IMG_20260325_123524.jpg" },
            { id: "er_7", name: "宋美丽鸡汤饭", dish: "鸡汤饭/煲汤", imageSrc: "新增/二楼/IMG_20260325_123531.jpg" },
            { id: "er_8", name: "潮汕味道", dish: "潮汕粿条", imageSrc: "新增/二楼/IMG_20260325_123538.jpg" },
            { id: "er_9", name: "南昌拌粉·瓦罐汤", dish: "拌粉/瓦罐汤", imageSrc: "新增/二楼/IMG_20260325_123543.jpg" },
            { id: "er_10", name: "绝云烧饼", dish: "烧饼/小吃", imageSrc: "新增/二楼/IMG_20260325_123552.jpg" },
            { id: "er_11", name: "小食光 热炒", dish: "热炒/小食", imageSrc: "新增/二楼/IMG_20260325_123620.jpg" },
            { id: "er_12", name: "昆仑馄饨", dish: "馄饨/小吃", imageSrc: "新增/二楼/IMG_20260325_123630.jpg" },
            { id: "er_13", name: "街味豆花饭", dish: "豆花饭/豆花", imageSrc: "新增/二楼/IMG_20260325_123642.jpg" }
        ];
        const drinkOptions = [
            { id: "drink_1", name: "Tim Hortons", dish: "咖啡/饮品", qrImage: "新增/喝什么/IMG_20260325_124231.jpg", url: "https://wechat.timhortons.com.cn/#/miniapp/menu?storecode=5105" },
            { id: "drink_2", name: "瑞幸咖啡", dish: "咖啡/茶饮", qrImage: "新增/喝什么/IMG_20260325_124455.jpg", url: "https://m.lkcoffee.com/qrcode2mini/pages/index/menu0401" },
            { id: "drink_3", name: "Cotti Coffee", dish: "咖啡/饮品", qrImage: "新增/喝什么/IMG_20260325_124630.jpg", url: "https://m.cotticoffee.com/#/minimenu" }
        ];

        const combinedFloorRestaurants = [
            ...firstFloorRestaurants.map(r => ({...r, floor: '1楼'})),
            ...secondFloorRestaurants.map(r => ({...r, floor: '2楼'}))
        ];

        async function fetchMarketData() {
            // 使用东方财富 API (支持 CORS)
            // secid: 1=上证, 0=深证
            const urls = [
                'https://push2.eastmoney.com/api/qt/stock/get?secid=1.000001&fields=f43,f58,f169,f170',
                'https://push2.eastmoney.com/api/qt/stock/get?secid=0.399001&fields=f43,f58,f169,f170'
            ];
            
            try {
                const responses = await Promise.all(urls.map(url => fetch(url)));
                const jsons = await Promise.all(responses.map(r => r.json()));
                
                const results = [];
                for (const json of jsons) {
                    if (json?.data) {
                        const d = json.data;
                        // f43=当前价(分), f58=名称, f169=涨跌额(分), f170=涨跌幅(万分比)
                        results.push({
                            name: d.f58,
                            price: (d.f43 / 100).toFixed(2),
                            change: (d.f169 / 100).toFixed(2),
                            changePercent: (d.f170 / 100).toFixed(2)
                        });
                    }
                }
                
                if (results.length === 2) {
                    return results;
                }
            } catch (e) {
                console.log('Market data fetch failed:', e);
            }
            
            // 备用：返回错误状态
            return [
                { name: '上证指数', price: '--', change: '--', changePercent: '--' },
                { name: '深证成指', price: '--', change: '--', changePercent: '--' }
            ];
        }

        function renderMarketData(indices) {
            const container = document.getElementById('marketIndices');
            let html = '';
            let totalChange = 0;
            let hasValidData = true;
            
            indices.forEach(idx => {
                const changeNum = parseFloat(idx.change);
                const isUp = !isNaN(changeNum) && changeNum >= 0;
                const changeStr = isNaN(changeNum) ? idx.change : ((isUp ? '+' : '') + changeNum.toFixed(2));
                const percentStr = isNaN(changeNum) ? idx.changePercent + '%' : ((isUp ? '+' : '') + parseFloat(idx.changePercent).toFixed(2) + '%');
                
                html += `<div class="market-index">
                    <div class="market-index-name">${idx.name}</div>
                    <div class="market-index-price">${idx.price}</div>
                    <div class="market-index-change ${isNaN(changeNum) ? '' : (isUp ? 'market-change-up' : 'market-change-down')}">
                        ${changeStr} (${percentStr})
                    </div>
                </div>`;
                
                if (!isNaN(changeNum)) {
                    totalChange += parseFloat(idx.changePercent);
                } else {
                    hasValidData = false;
                }
            });
            
            container.innerHTML = html;
            
            const tipEl = document.getElementById('marketTip');
            
            if (!hasValidData) {
                tipEl.className = 'market-tip flat';
                tipEl.textContent = '📡 行情加载中...';
                return;
            }
            
            const avgChange = totalChange / indices.length;
            
            if (avgChange > 0.5) {
                tipEl.className = 'market-tip up';
                tipEl.textContent = '📈 今日大涨，大餐伺候';
            } else if (avgChange < -0.5) {
                tipEl.className = 'market-tip down';
                tipEl.textContent = '📉 今日亏损，不如吃草';
            } else {
                tipEl.className = 'market-tip flat';
                tipEl.textContent = '🌊 偶有风浪，积极干饭';
            }
        }

        function makeQrImageUrl(text) {
            return `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(text)}`;
        }

        // Get current hour to determine business status
        function getBusinessStatus() {
            const hour = new Date().getHours();
            // Assume restaurants open 10:00-21:00
            if (hour >= 10 && hour < 21) {
                return { status: 'open', text: '营业中' };
            } else {
                return { status: 'closed', text: '已打烊' };
            }
        }

        const VOTE_VERSION = "v1";
        function voteChoiceKey(moduleKey, id) { return `lunchPicker.vote.choice.${VOTE_VERSION}.${moduleKey}.${id}`; }
        function voteCountsKey(moduleKey, id) { return `lunchPicker.vote.counts.${VOTE_VERSION}.${moduleKey}.${id}`; }
        function getVoteChoice(moduleKey, id) { return localStorage.getItem(voteChoiceKey(moduleKey, id)); }
        function getVoteCounts(moduleKey, id) {
            const raw = localStorage.getItem(voteCountsKey(moduleKey, id));
            if (!raw) return { up: 0, down: 0 };
            try { return JSON.parse(raw); } catch (_) { return { up: 0, down: 0 }; }
        }
        function setVoteChoice(moduleKey, id, choice) { localStorage.setItem(voteChoiceKey(moduleKey, id), choice); }
        function setVoteCounts(moduleKey, id, counts) { localStorage.setItem(voteCountsKey(moduleKey, id), JSON.stringify(counts)); }
        function voteBtnClass(moduleKey, id, choice) {
            const c = getVoteChoice(moduleKey, id);
            if (c === choice && choice === "like") return "selected-like";
            if (c === choice && choice === "dislike") return "selected-dislike";
            return "";
        }
        function handleVote(moduleKey, id, choice, evt) {
            evt.preventDefault(); evt.stopPropagation();
            const current = getVoteChoice(moduleKey, id);
            if (current === choice) return;
            const counts = getVoteCounts(moduleKey, id);
            if (current === "like") counts.up = Math.max(0, (counts.up || 0) - 1);
            if (current === "dislike") counts.down = Math.max(0, (counts.down || 0) - 1);
            if (choice === "like") counts.up = (counts.up || 0) + 1;
            if (choice === "dislike") counts.down = (counts.down || 0) + 1;
            setVoteChoice(moduleKey, id, choice); setVoteCounts(moduleKey, id, counts); renderAllMenus();
        }
        function renderCard(item, moduleKey, clickFn, iconHtml, rightTag) {
            const c = getVoteCounts(moduleKey, item.id);
            return `<div class="restaurant-card" onclick="${clickFn}('${item.id}')">
                <div class="restaurant-icon" style="background:${item.iconBg || 'linear-gradient(135deg, #22c55e 0%, #16a34a 100%)'}">${iconHtml || item.icon || '🏪'}</div>
                <div class="restaurant-info">
                    <div class="restaurant-name">${item.name}</div>
                    <div class="restaurant-tags">${item.tags || item.dish}</div>
                    <div class="restaurant-votes">
                        <button class="vote-btn ${voteBtnClass(moduleKey, item.id, 'like')}" onclick="handleVote('${moduleKey}','${item.id}','like',event)">👍 ${c.up || 0}</button>
                        <button class="vote-btn ${voteBtnClass(moduleKey, item.id, 'dislike')}" onclick="handleVote('${moduleKey}','${item.id}','dislike',event)">👎 ${c.down || 0}</button>
                    </div>
                </div>
                ${rightTag || '<span class="arrow-icon">›</span>'}
            </div>`;
        }
        function renderAllMenus() {
            const bs = getBusinessStatus();
            document.getElementById("firstRestaurantList").innerHTML = firstFloorRestaurants.map(r => renderCard(r, "first", "openFirstFloorModal", r.icon, `<span class="status-badge status-${bs.status}">${bs.text}</span><span class="arrow-icon">›</span>`)).join("");
            document.getElementById("secondRestaurantList").innerHTML = secondFloorRestaurants.map(r => renderCard(r, "second", "openSecondFloorModal", "🏮")).join("");
            document.getElementById("drinkOrderList").innerHTML = drinkOptions.map(r => renderCard(r, "drink", "openDrinkModal", "🥤")).join("");
        }
        function openFirstFloorModal(id) {
            const r = firstFloorRestaurants.find(x => x.id === id); if (!r) return;
            document.getElementById("modalTitle").textContent = r.name;
            document.getElementById("modalTags").textContent = r.tags;
            document.getElementById("modalHint").textContent = "请使用微信/支付宝扫码下单";
            document.getElementById("modalQr").src = r.url ? makeQrImageUrl(r.url) : r.qrImage;
            document.getElementById("qrModal").classList.add("show");
        }
        function openSecondFloorModal(id) {
            const r = secondFloorRestaurants.find(x => x.id === id); if (!r) return;
            document.getElementById("modalTitle").textContent = r.name;
            document.getElementById("modalTags").textContent = r.dish;
            document.getElementById("modalHint").textContent = "查看档口图片（如图中有码可扫码）";
            document.getElementById("modalQr").src = r.imageSrc;
            document.getElementById("qrModal").classList.add("show");
        }
        function openDrinkModal(id) {
            const r = drinkOptions.find(x => x.id === id); if (!r) return;
            document.getElementById("modalTitle").textContent = r.name;
            document.getElementById("modalTags").textContent = r.dish;
            document.getElementById("modalHint").textContent = "请扫码点单";
            document.getElementById("modalQr").src = r.url ? makeQrImageUrl(r.url) : r.qrImage;
            document.getElementById("qrModal").classList.add("show");
        }
        function drawCommon(btnId, cardId, nameId, dishId, actionId, list, openFn) {
            const btn = document.getElementById(btnId);
            btn.classList.add("shaking"); btn.disabled = true; btn.innerHTML = "抽奖中<span class='loading'></span>";
            setTimeout(() => {
                btn.classList.remove("shaking");
                const item = list[Math.floor(Math.random() * list.length)];
                document.getElementById(nameId).textContent = item.name;
                document.getElementById(dishId).textContent = `推荐: ${item.dish}`;
                const action = document.getElementById(actionId);
                action.onclick = function(e) { e.preventDefault(); openFn(item.id); };
                const card = document.getElementById(cardId);
                card.classList.remove("show"); void card.offsetWidth; card.classList.add("show");
                btn.innerHTML = "🎲 再抽一次"; btn.disabled = false;
            }, 1500);
        }

        function drawFloor() {
            const btn = document.getElementById("floorDrawBtn");
            btn.classList.add("shaking"); btn.disabled = true; btn.innerHTML = "抽奖中<span class='loading'></span>";
            setTimeout(() => {
                btn.classList.remove("shaking");
                const item = combinedFloorRestaurants[Math.floor(Math.random() * combinedFloorRestaurants.length)];
                document.getElementById("floorResultRestaurant").textContent = item.name;
                document.getElementById("floorResultDish").textContent = `推荐: ${item.dish}（${item.floor}）`;
                const action = document.getElementById("floorResultAction");
                action.onclick = function(e) { e.preventDefault(); 
                    if (item.floor === '1楼') openFirstFloorModal(item.id);
                    else openSecondFloorModal(item.id);
                };
                const card = document.getElementById("floorResultCard");
                card.classList.remove("show"); void card.offsetWidth; card.classList.add("show");
                btn.innerHTML = "🎲 再抽一次"; btn.disabled = false;
            }, 1500);
        }

        function drawDrink() { drawCommon("drinkDrawBtn", "drinkResultCard", "drinkResultRestaurant", "drinkResultDish", "drinkResultAction", drinkOptions, openDrinkModal); }

        // Close modal
        function closeModal() {
            document.getElementById('qrModal').classList.remove('show');
        }

        // Close modal when clicking outside
        document.getElementById('qrModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        // Initialize
        renderAllMenus();
        fetchMarketData().then(renderMarketData);
    </script>
</body>
</html>
